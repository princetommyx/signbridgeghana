<ion-content>
  <div class="dictionary-wrapper">
    <!-- Main Search Section -->
    <div class="search-section">
      <div class="search-container">
        <div class="search-bar">
          <ion-icon name="search-outline" class="search-icon"></ion-icon>
          <input
            type="text"
            [ngModel]="searchQuery$ | async"
            (input)="onSearchChange($event)"
            placeholder="Search for a word (e.g., hello, teacher)..." />
          <div class="mic-container">
            <ion-icon name="mic-outline"></ion-icon>
          </div>
        </div>
      </div>

      <div class="try-these">
        <span class="label">TRY THESE</span>
        <div class="chips-container">
          <button class="chip" (click)="setSearchQuery('Hello')">Hello</button>
          <button class="chip" (click)="setSearchQuery('Thank you')">Thank you</button>
          <button class="chip" (click)="setSearchQuery('Teacher')">Teacher</button>
          <button class="chip" (click)="setSearchQuery('Student')">Student</button>
          <button class="chip" (click)="setSearchQuery('Ghana')">Ghana</button>
          <button class="chip" (click)="setSearchQuery('Water')">Water</button>
        </div>
      </div>
    </div>

    <!-- Index Section -->
    <div class="index-section">
      <div class="index-header">
        <div class="title-with-icon">
          <ion-icon name="book-outline"></ion-icon>
          <h2>DICTIONARY INDEX</h2>
        </div>
        <div class="entry-count" *ngIf="filteredSigns$ | async as signs">{{ signs.length }} ENTRIES</div>
      </div>

      <div class="alphabet-grid">
        <button
          *ngFor="let char of alphabet"
          class="letter-btn"
          [class.active]="(selectedLetter$ | async) === char"
          (click)="filterByLetter(char)">
          {{ char }}
        </button>
      </div>
    </div>

    <!-- Results Grid -->
    <div class="results-container">
      <div class="results-grid" *ngIf="filteredSigns$ | async as signs">
        <div class="word-card" *ngFor="let sign of signs | slice: 0 : displayedLimit">
          <div class="card-top">
            <h3 class="word-title">{{ sign.word | uppercase }}</h3>
            <span class="variant-badge">1 VAR</span>
          </div>
          <div class="card-bottom">
            <div class="page-ref">
              <ion-icon name="book-outline"></ion-icon>
              <span>PAGE {{ sign.pageNumber }}</span>
            </div>
            <div class="category-tag">{{ sign.category }}</div>
          </div>

          <!-- Detailed content (shown on hover/click in future) -->
          <div class="card-expand" *ngIf="sign.image">
            <img [src]="sign.image" [alt]="sign.word" loading="lazy" />
            <p>{{ sign.description }}</p>
          </div>
        </div>

        <div class="no-results" *ngIf="signs.length === 0">
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>No entries found</h3>
            <p>Try searching for a different word or clear your filters.</p>
          </div>
        </div>
      </div>

      <!-- Infinite Scroll -->
      <ion-infinite-scroll (ionInfinite)="loadMore($event)">
        <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more signs...">
        </ion-infinite-scroll-content>
      </ion-infinite-scroll>
    </div>
  </div>
</ion-content>
