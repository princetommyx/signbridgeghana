<div class="chatbot-container" [class.open]="isOpen">
  <!-- Trigger Button -->
  <button class="chat-trigger" (click)="toggle()">
    @if (isOpen) {
      <span class="icon">✕</span>
    } @else {
      <span class="icon">✨</span>
    }
  </button>

  <!-- Chat Window -->
  <div class="chat-window">
    <div class="chat-header">
      <h3>AI Assistant 🇬🇭</h3>
      <p>Powered by Gemini 1.5 Flash</p>
    </div>

    <div class="messages-list" #messagesList>
      @for (msg of messages; track $index) {
        <div class="message-group" [class.user]="msg.role === 'user'">
          <div class="message-bubble">
            {{ stripDictionaryLink(msg.text) }}
          </div>

          <!-- Special Dictionary Reference Button -->
          @if (msg.role === 'assistant' && getDictionaryLink(msg.text); as link) {
            <button class="dictionary-ref-btn" (click)="$event.stopPropagation(); goToDictionary(link)">
              <span class="btn-icon">📚</span>
              View "{{ link }}" in Dictionary
            </button>
          }
        </div>
      }

      @if (isSending) {
        <div class="message-group">
          <div class="message-bubble typing"><span></span><span></span><span></span></div>
        </div>
      }

      @if (errorMessage) {
        <div class="error-banner">
          {{ errorMessage }}
        </div>
      }
    </div>

    <div class="chat-input">
      <textarea
        [(ngModel)]="inputText"
        placeholder="How do I sign 'Hello'?"
        (keydown)="onKeydown($event)"
        [disabled]="isSending"></textarea>
      <button class="send-btn" [disabled]="!canSend" (click)="send()">
        <span class="icon">↗</span>
      </button>
    </div>
  </div>
</div>
