<ion-content [fullscreen]="true">
  <div class="translate-shell">
    <!-- Sophisticated background pattern handled in SCSS -->
    <div class="mesh-pattern"></div>

    <div class="container" style="padding-top: 2rem">
      <!-- Premium App Header -->
      <header
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; width: 100%">
        <div style="display: flex; flex-direction: column">
          <span class="gradient-text" style="font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px"
            >SignBridge Workspace</span
          >
          <p style="color: var(--sb-text-muted); font-size: 0.875rem; margin: 0.25rem 0 0">
            Real-time Ghanaian Sign Language Interpretation
          </p>
        </div>

        <div
          class="hero-mode glass-card"
          [class.signed-mode]="!spokenToSigned"
          style="
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 1px;
          ">
          @if (spokenToSigned) {
            <span style="display: flex; align-items: center; gap: 0.5rem">
              <div
                style="
                  width: 8px;
                  height: 8px;
                  background: var(--sb-primary);
                  border-radius: 50%;
                  box-shadow: 0 0 10px var(--sb-primary);
                "></div>
              SPOKEN TO SIGN
            </span>
          } @else {
            <span style="display: flex; align-items: center; gap: 0.5rem">
              <div
                style="
                  width: 8px;
                  height: 8px;
                  background: var(--sb-accent);
                  border-radius: 50%;
                  box-shadow: 0 0 10px var(--sb-accent);
                "></div>
              SIGN TO SPOKEN
            </span>
          }
        </div>
      </header>

      <div id="input-mode-group" class="glass-card" style="margin-bottom: 1.5rem; border-radius: 16px">
        @if (spokenToSigned) {
          <app-translate-input-button mode="text" icon="language" />
        } @else {
          <app-translate-input-button mode="webcam" icon="videocam" />
          <app-translate-input-button mode="upload" icon="cloud-upload" />
        }
        <div class="disclaimer" style="margin-left: auto">
          <ion-icon name="information-circle-outline" style="font-size: 1.25rem; color: var(--sb-primary)"></ion-icon>
          <span style="color: var(--sb-text-muted); font-size: 0.75rem">
            Powered by GSL Edge-AI. See
            <a routerLink="/legal/privacy" style="color: var(--sb-primary); font-weight: 600">Privacy</a>.
          </span>
        </div>
      </div>

      <app-drop-pose-file>
        <div id="translation-card" class="glass-card" style="padding-top: 1rem; border-radius: 24px">
          <app-language-selectors />

          <div id="content">
            @if (spokenToSigned) {
              <app-spoken-to-signed />
            } @else {
              <app-signed-to-spoken />
            }
          </div>
        </div>
      </app-drop-pose-file>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem">
        <app-send-feedback />
        <div style="display: flex; gap: 0.5rem">
          <span
            style="
              padding: 0.25rem 0.5rem;
              border: 1px solid var(--sb-glass-border);
              border-radius: 4px;
              font-size: 0.65rem;
              color: var(--sb-text-muted);
            "
            >GSL v2.0</span
          >
          <span
            style="
              padding: 0.25rem 0.5rem;
              border: 1px solid var(--sb-glass-border);
              border-radius: 4px;
              font-size: 0.65rem;
              color: var(--sb-text-muted);
            "
            >Latency: 45ms</span
          >
        </div>
      </div>
    </div>
  </div>

  <app-chatbot-widget></app-chatbot-widget>
</ion-content>
