<ion-menu contentId="mobile-translate-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>Menu</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-list>
      <ion-list-header lines="full">
        <ion-label>Pages</ion-label>
      </ion-list-header>
      <ion-menu-toggle>
        @for (page of pages; track page.key) {
          <ion-item [routerLink]="page.route" queryParamsHandling="preserve">
            <ion-label>{{ 'landing.' + page.key + '.title' | transloco }}</ion-label>
          </ion-item>
        }
      </ion-menu-toggle>
    </ion-list>
  </ion-content>
</ion-menu>

<ion-header [translucent]="true">
  <ion-toolbar class="mobile-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button auto-hide="true" color="dark"></ion-menu-button>
    </ion-buttons>
    <app-language-selectors />
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" id="mobile-translate-content">
  <div class="mobile-shell">
    <div class="status-hero">
      <div class="status-indicator">
        <span class="dot"></span>
        <span class="text">GSL AI Bridge 🇬🇭</span>
      </div>
      <h2>{{ (spokenToSigned$ | async) ? 'Translate to GSL' : 'Interpret to Text' }}</h2>
    </div>

    <section class="mobile-stage" [class.video-stage]="!spokenToSigned">
      @if (spokenToSigned) {
        <app-signed-language-output />
      } @else {
        <app-video [displayControls]="false" [displayFps]="false" />
      }
    </section>
  </div>
</ion-content>

<!-- Footer with input and submit button -->
<ion-footer [class.signed-to-spoken]="!spokenToSigned">
  <div class="mobile-footer-inner">
    @if (spokenToSigned) {
      <app-spoken-language-input [isMobile]="true" />
    } @else {
      <app-signed-language-input />
    }
  </div>
</ion-footer>
