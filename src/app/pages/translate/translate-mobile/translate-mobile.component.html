<ion-header [translucent]="true">
  <ion-toolbar class="mobile-toolbar">
    <app-language-selectors />
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="mobile-shell">
    <div class="status-hero">
      <div class="status-indicator">
        <span class="dot"></span>
        <span class="text">Live AI Interpreter</span>
      </div>
      <h2>{{ (spokenToSigned$ | async) ? 'Text & Speech to Sign' : 'Sign to Speech & Text' }}</h2>
    </div>

    <section class="mobile-stage" [class.video-stage]="!spokenToSigned">
      @if (spokenToSigned) {
        <app-signed-language-output />
      } @else {
        <app-video [displayControls]="false" [displayFps]="false" />
      }
    </section>
  </div>
</ion-content>

<!-- Footer with input and submit button -->
<ion-footer [class.signed-to-spoken]="!spokenToSigned">
  <div class="mobile-footer-inner">
    @if (spokenToSigned) {
      <app-spoken-language-input [isMobile]="true" />
    } @else {
      <app-signed-language-input />
    }
  </div>
</ion-footer>

<app-chatbot-widget></app-chatbot-widget>
